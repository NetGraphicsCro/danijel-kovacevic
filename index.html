    const prevCursor = hero.style.cursor;

    return html2canvas(hero, {
      backgroundColor: '#0a0a0a',
      scale: window.devicePixelRatio || 1,
      logging: false,
      useCORS: true

      heroSnapshot = canvas;
      initPixi();

      console.warn('html2canvas failed', err);
      heroSnapshot = null;
    }).finally(() => { hero.style.cursor = prevCursor; });

      vec2 x0 = v -   i + dot(i, C.xx);
      vec2 i1;
      i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
      vec4 x12 = x0.xyxy + C.xxzz;
      x12.xy -= i1;
      i = mod289(i);
      vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
                      + i.x + vec3(0.0, i1.x, 1.0 ));
      vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
      m = m*m;
      m = m*m;

      vec3 a0 = x - ox;
      m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
      vec3 g;
      g.x  = a0.x * x0.x + h.x * x0.y;
      g.yz = a0.yz * x12.xz + h.yz * x12.yw;
      return 130.0 * dot(m, g);

  // Pixi init with simplex shader
  function initPixi(){
    // destroy previous
    if (pixiApp){

    if (!heroSnapshot) return;

    pixiApp = new PIXI.Application({
      width: LENS_SIZE,
      height: LENS_SIZE,
      transparent: true,

    pixiApp.view.style.width = '100%';
    pixiApp.view.style.height = '100%';
    pixiApp.stage.interactive = false;

    const tex = PIXI.Texture.from(heroSnapshot);
    sprite = new PIXI.Sprite(tex);
    sprite.scale.set(SCALE);

    container = new PIXI.Container();
    // circle mask
    const maskG = new PIXI.Graphics();
    maskG.beginFill(0xffffff);
    maskG.drawCircle(LENS_SIZE/2, LENS_SIZE/2, LENS_SIZE/2);
    maskG.endFill();
    container.addChild(sprite);
    container.mask = maskG;
    pixiApp.stage.addChild(container);
    pixiApp.stage.addChild(maskG);
